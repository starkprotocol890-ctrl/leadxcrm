<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — LEAD 360</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="leadx_v5.css?v=final_fix">
</head>
<body class="auth-page">

  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <div class="logo">LEAD</div>
        <div class="logo-sub">360</div>
        <h1>Create account</h1>
        <p>Start managing your leads today</p>
      </div>

      <form id="signupForm" class="auth-form">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" placeholder="John Doe" required>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@example.com" required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Min 6 characters" required minlength="6">
        </div>

        <div class="form-group" id="errorMsg" style="display: none;">
          <div class="error-box"></div>
        </div>

        <button type="submit" class="btn-primary">Create Account</button>
      </form>

      <div class="auth-footer">
        <p>Already have an account? <a href="login.html">Sign in</a></p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script type="module">
    import { supabaseClient } from './src/config/supabase.js';

    // Redirect if already logged in
    supabaseClient.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.href = 'index.html';
    });

    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorBox = document.querySelector('.error-box');

      const { data, error } = await supabaseClient.auth.signUp({
        email,
        password,
        options: {
          data: {
            full_name: name
          }
        }
      });

      if (error) {
        errorBox.textContent = error.message;
        document.getElementById('errorMsg').style.display = 'block';
        return;
      }

      alert('Account created successfully! Please sign in.');
      window.location.href = 'login.html';
    });
  </script>
</body>
</html>
